<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言互动</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/twikoo@1.7.13/dist/twikoo.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7c3aed;
            --accent: #00ff88;
            --bg: #f8f9fa;
            --card: rgba(255,255,255,0.85);
            --text: #1a1a2e;
            --text-light: #6b7280;
            --border: rgba(0,212,255,0.3);
            --gradient: linear-gradient(135deg, #00d4ff, #7c3aed);
            --gradient-accent: linear-gradient(135deg, #00ff88, #00d4ff);
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --shadow-neon: 0 0 20px rgba(0,212,255,0.15), 0 0 40px rgba(124,58,237,0.1);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
        }

        .container {
            position: relative;
            max-width: 100%;
            width: 100%;
        }

        /* 背景装饰 */
        .container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulse 4s ease-in-out infinite;
        }

        .container::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulse 4s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* 卡片 */
        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: visible;
            position: relative;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            box-shadow: var(--shadow-neon);
            transform: translateY(-2px);
        }

        /* 渐变边框 */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient);
            z-index: 1;
        }

        /* 头部 */
        .header {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,212,255,0.1);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .title-icon {
            font-size: 1.3rem;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* 评论区 */
        .comments {
            padding: 1.5rem 2rem;
        }

        /* 几何装饰 */
        .decoration {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .decoration-1 {
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(0,212,255,0.2);
            transform: rotate(45deg);
            animation: float 6s ease-in-out infinite;
        }

        .decoration-2 {
            bottom: 40px;
            left: 30px;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(124,58,237,0.2);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(45deg); }
            50% { transform: translateY(-10px) rotate(45deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            body { padding: 1rem 0.5rem; }
            .header { padding: 1rem 1.5rem; flex-direction: column; gap: 0.5rem; align-items: flex-start; }
            .title { font-size: 1.25rem; }
            .comments { padding: 1rem 1.5rem; }
            .decoration { display: none; }
        }

        @media (max-width: 480px) {
            .header { padding: 0.75rem 1rem; }
            .comments { padding: 0.75rem 1rem; }
        }

        /* Twikoo 评论区文字颜色 */
        #tcomments,
        #tcomments *,
        .tk-content,
        .tk-nick,
        .tk-time,
        .tk-actions,
        .tk-comments-title,
        .tk-comments-count,
        .tk-meta-input input,
        .tk-content textarea,
        .tk-meta-input input::placeholder,
        .tk-content textarea::placeholder,
        .twikoo .el-input__inner,
        .twikoo .el-textarea__inner,
        .tk-submit button {
            color: rgb(114, 4, 4) !important;
            -webkit-text-fill-color: rgb(114, 4, 4) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>

        <div class="card">
            <div class="header">
                <div class="title">
                    <span class="title-icon">💬</span>
                    <span>留言互动</span>
                </div>
                <div class="subtitle">Powered by Twikoo | 数据存储：MongoDB Atlas</div>
            </div>
            <div class="comments">
                <div id="tcomments"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/twikoo@1.7.13/dist/twikoo.all.min.js"></script>
    <script>
        twikoo.init({
            envId: 'https://twikoo-ydp0.onrender.com',
            el: '#tcomments',
            region: '',
            path: '/liuyan/',
            placeholder: '留下你的想法...'
        }).then(function() {
            console.log('[Twikoo] 初始化成功');
        }).catch(function(e) {
            console.error('[Twikoo] 初始化失败:', e);
        });
    </script>
</body>
</html>
